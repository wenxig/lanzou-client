<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
		<title>Hello APICloud</title>
		<link rel="stylesheet" type="text/css" href="./css/api.css" />
		<link rel="stylesheet" type="text/css" href="./css/common.css" />
		<style>
			.center {
				display: -webkit-box;
				-webkit-box-orient: vertical;
				-webkit-box-pack: center;
				-webkit-box-align: center;
			}
			.load2 {
				height: 50px;
				padding-top: 15px
			}
			.load2 .loader, .load2 .loader:before, .load2 .loader:after {
				border-radius: 50%;
			}
			.load2 .loader:before, .load2 .loader:after {
				position: absolute;
				content: '';
			}
			.load2 .loader:before {
				width: 16px;
				height: 32px;
				background: #fff;
				border-radius: 32px 0 0 32px;
				top: -1px;
				left: -1px;
				transform-origin: 16px 16px;
				-webkit-animation: load2 2s infinite ease 1.5s;
			}
			.load2 .loader {
				font-size: 11px;
				text-indent: -99999em;
				margin: auto;
				position: relative;
				width: 30px;
				height: 30px;
				box-shadow: inset 0 0 0 4px #09f;
			}
			.load2 .loader:after {
				width: 16px;
				height: 32px;
				background: #fff;
				border-radius: 0 31px 31px 0;
				top: -1px;
				left: 15px;
				transform-origin: 0px 16px;
				-webkit-animation: load2 2s infinite ease;
			}
			@-webkit-keyframes load2 {
			0% {
			-webkit-transform: rotate(0deg);
			}
			100% {
			-webkit-transform: rotate(360deg);
			}
			}
		</style>
	</head>
	<body style='background:#FFFFFF;'>
		<div id="wrap">
			<div id="main" class='center'>
				<div class="load2" id="loading" style="margin-top: 30%;">
					<div class="loader"></div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="./script/api.js"></script>
	<script type="text/javascript">
		var launchRemoved = false;
		var loadingRemoved = false;
		apiready = function() {
			//定义版本号
			$api.setStorage('ves', 10);
			//状态颜色
			api.setStatusBarStyle({
				style: 'light',
				color:'#ddd'
			});
			//初始化back
			$api.setStorage('back', 0);
			api.setStatusBarStyle({
				style : 'light'
			});
			api.openFrame({
				name : 'main',
				url : 'https://up.woozooo.com/mlogin.php?v',
				bounces : false,
				allowEdit : true,
				bgColor : 'rgba(255,255,255,1)',
				rect : {
					w : 'auto',
					h : 'auto'
				},
				progress : {
					type : 'page',
					color : '#eeeeee'
				},
				animation : {
					type : 'suck', //动画类型（详见动画类型常量）
					subType : 'from_right', //动画子类型（详见动画子类型常量）
					duration : 100 //动画过渡时间，默认300毫秒
				}
			});
			api.setFrameClient({
				frameName : 'main'
			}, function(ret) {
				onBrowserStateChange(ret);
			});
			removeLogic();
			//back
			api.addEventListener({
				name : 'keyback'
			}, function(ret, err) {
				var back = $api.getStorage('back');
				if (back == 1) {
					//1=新建文件夹,
					var jsfun = 'fbtndec();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				} else if (back == 2) {
				// 2=短网址
				var jsfun = 'dfbtndec();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				} else if(back == 3){
				//3=文件描述
				var jsfun = 'file_desccl();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				
				}else if(back == 4){
				//4=文件二维码
				var jsfun = 'file_cl();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				}else if(back == 5){
				//5=上传文件
				var jsfun = 'uploadinfo();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				}else if(back == 6){
				//6=找回用户名
				var jsfun = 'userdec();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				}else if(back == 7){
				//7=找回密码
				var jsfun = 'pwddec();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				
				}else if(back == 8){
				//8=文件密码
				var jsfun = 'filepwd();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				}else if(back == 9){
				//9=文件移动
				var jsfun = 'filem();';
					api.execScript({
						frameName : 'main',
						script : jsfun
					});
				} else {
					api.closeWidget({
						silent : true
					});
				}
			});
			removeLogic();
		};
		function onBrowserStateChange(ret) {
			if (0 == ret.state) {//开始加载
				if (!launchRemoved) {
					launchRemoved = true;
					removeLaunch();
				}
			}
			if (2 == ret.state) {
				if (!loadingRemoved) {
					loadingRemoved = true;
					document.getElementById('loading').style.display = 'none';
				}
			}
		}

		function removeLogic() {
			setTimeout(function() {
				if (!launchRemoved) {
					launchRemoved = true;
					removeLaunch();
				}
			}, 3000);
		}

		function removeLaunch() {
			api.removeLaunchView({
				animation : {
					type : "fade",
					subType : "from_right",
					duration : 300
				}
			});
		}
	</script>
</html>
