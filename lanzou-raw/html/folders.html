<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
		<title>folders</title>
		<link rel="stylesheet" type="text/css" href="./css/api.css" />
		<style>
			.center {
				display: -webkit-box;
				-webkit-box-orient: vertical;
				-webkit-box-pack: center;
				-webkit-box-align: center;
			}
			.load2 {
				height: 50px;
				padding-top: 15px
			}
			.load2 .loader, .load2 .loader:before, .load2 .loader:after {
				border-radius: 50%;
			}
			.load2 .loader:before, .load2 .loader:after {
				position: absolute;
				content: '';
			}
			.load2 .loader:before {
				width: 16px;
				height: 32px;
				background: #fff;
				border-radius: 32px 0 0 32px;
				top: -1px;
				left: -1px;
				transform-origin: 16px 16px;
				-webkit-animation: load2 2s infinite ease 1.5s;
			}
			.load2 .loader {
				font-size: 11px;
				text-indent: -99999em;
				margin: auto;
				position: relative;
				width: 30px;
				height: 30px;
				box-shadow: inset 0 0 0 4px #09f;
			}
			.load2 .loader:after {
				width: 16px;
				height: 32px;
				background: #fff;
				border-radius: 0 31px 31px 0;
				top: -1px;
				left: 15px;
				transform-origin: 0px 16px;
				-webkit-animation: load2 2s infinite ease;
			}
			@-webkit-keyframes load2 {
			0% {
			-webkit-transform: rotate(0deg);
			}
			100% {
			-webkit-transform: rotate(360deg);
			}
			}
		</style>
	</head>
	<body style='background:#FFFFFF;'>
		<div id="wrap">
			<div id="main" class='center'>
				<div class="load2" id="loading" style="margin-top: 30%;">
					<div class="loader"></div>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../script/api.js"></script>
	<script type="text/javascript">

		apiready = function() {
			
			//验证是否登录过期
			api.ajax({
				url : 'https://up.woozooo.com/doupload.php?v2',
				method : 'post',
				timeout : 5,
				dataType : 'json',
				returnAll : false,
			}, function(ret, err) {
				//$api.byId('loading').style.display = "none";
				if (ret) {
					if (ret.zt == 0) {
						//验证通过
						var folderid = $api.getStorage('folderid');
						api.openFrame({
							name : 'folderst',
							url : 'https://up.woozooo.com/myfile.php?item=3&folder_id='+folderid+'&v2',
							bounces : false,
							allowEdit : true,
							rect : {
								w : 'auto',
								h : 'auto'
							},
							progress : {
								type : 'page',
								color : '#eeeeee'
							}
						});
					} else if (ret.zt == 9) {
						//返回登录
						//刷新myfile
						api.sendEvent({
							name : 'shuaxin',
							extra : {
								shua : '1'
							}
						});
						setTimeout('api.closeWin();', 1000);
						api.toast({
							msg : ('请登录后操作')
							//msg : ('错误码：' + err.code + '；错误信息：' + err.msg + '；网络状态码：' + err.statusCode)
						});
					}
				} else if (err) { {
						api.toast({
							msg : ('您的网络不好，请重试')
							//msg : ('错误码：' + err.code + '；错误信息：' + err.msg + '；网络状态码：' + err.statusCode)
						});
					}
				}
			})
			
		};
		
	</script>
</html>
